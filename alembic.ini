[alembic]
# script_location: onde ficam env.py, versions/ e script.py.mako
script_location = src/finsight/db/migrations

# prepend_sys_path: adiciona o src/ ao sys.path para que `from finsight.db.session import ...`
# funcione dentro do env.py sem instalar o pacote
prepend_sys_path = src

# file_template: padrão de nome dos arquivos de migration gerados
# %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s → 20240101_abc1234_create_documents.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# timezone para os timestamps nas migrations
timezone = UTC

# truncate_slug_length: limita o "slug" (descrição) do nome do arquivo
truncate_slug_length = 40

# sqlalchemy.url: sobrescrito no env.py via settings — esta linha é ignorada
# mas precisa existir para o Alembic não reclamar de configuração ausente
sqlalchemy.url = placeholder_overridden_in_env_py

[post_write_hooks]
# ruff: formata automaticamente cada arquivo de migration gerado
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
